<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>AniMate</title>
    <link rel="icon" href="imgs/Logo.svg">
    <link rel="stylesheet" href="estilos/estiloCanvas.css">

</head>

<body>

    <div id="topo">

        <div class="userIcons">
            <img src="imgs/pfp anon.svg" id="avatar" class="avatar">
            <img src="imgs/chat-bubble-icon 1.svg" id="chat" class="chat">
        </div>

        <div class="configs">

            <!-- Botão novo desenho -->
            <img src="imgs/delete_forever.svg" id="btnNew" class="fileCrud" title="deletar" style="cursor:pointer;">

            <!-- Botão salvar desenho -->
            <img src="imgs/Save 02.svg" id="btnSave" class="fileCrud" title="Salvar desenho" style="cursor:pointer;">

            <!-- Botão salvar novo desenho -->
            <img src="imgs/library_add.svg" id="btnSaveNew" class="fileCrud add" title="Salvar como novo"
                style="cursor:pointer;">

            <Button class="backbtn" title="voltar">
                <a href="animateperfil.html">
                    <img src="imgs/arrow_back_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg" class="seta_voltar">
                </a>
            </Button>
            <img src="imgs/settings_heart.svg" class="config" title="configurações de arquivo">

        </div>

    </div>

    <div id="divcanvas">
        <canvas id="canvasBelow"></canvas>
        <canvas id="canvas"></canvas>
        <canvas id="canvasAbove"></canvas>
        <canvas id="canvasfundo"></canvas>
    </div>

    <div id="ferramentas">

        <img src="imgs/Pincel.svg" id="pincel" class="tool" data-action="traçar">
        <img src="imgs/stylus_pencil.svg" id="tamanho" class="tool" data-action="mudartam">
        <img src="imgs/borracha.svg" id="borracha" class="tool" data-action="apagar">
        <input type="color" id="corr" class="tool">
        <img src="imgs/undo.svg" id="undo" class="tool" data-action="ir">
        <img src="imgs/Return.svg" id="redo" class="tool" data-action="voltar">

    </div>

    <!-- Mais tamanhos de traço-->
    <div class="tool-size" id="tool-size">

        <button class="button_size" data-size="1">
            <span class="stroken"></span>
        </button>

        <button class="button_size" data-size="2">
            <span class="stroken"></span>
        </button>

        <button class="button_size" data-size="5">
            <span class="stroken"></span>
        </button>

        <button class="button_size" data-size="7">
            <span class="stroken"></span>
        </button>

        <button class="button_size" data-size="10">
            <span class="stroken"></span>
        </button>

    </div>

    <div id="timelineFull">


        <div id="timelineTools">

            <img src="imgs/Pause 01.svg" id="pause" class="timeTool">
            <img src="imgs/Play 01.svg" id="play" class="timeTool">
            <img src="imgs/onionskin.svg" id="onionskin" class="timeTool">

        </div>

        <div id="frameTools">

            <img src="imgs/Align Left 02.svg" id="addBefore" class="frameTool">
            <img src="imgs/Hourglass 02.svg" id="timing" class="frameTool">
            <img src="imgs/File None.svg" id="deleteFrame" class="frameTool">
            <img src="imgs/Align Right 02.svg" id="addAfter" class="frameTool">

        </div>

        <div id="camadas">

            <div id="camadaAtual">
                <p id="layer" class="layer"> Layer 1</p>
                <img src="imgs/Settings Sparkle.svg" id="config_Camada" class="toolCamada">
                <img src="imgs/Arrow Down Contained 01.svg" id="escolher_Camada" class="toolCamada">
            </div>

            <div id="listLayers">
                <div id="layersScrollArea"></div>
                <button id="btnAddLayer" class="addLayerBtn" style="cursor:pointer;">+ Nova Camada</button>
            </div>

            <div id="layerSettings">

                <div class="layerSettingsRow" id="renameRow">
                    <label class="layerSettingsLabel" for="layerNameInput">Nome</label>
                    <input type="text" id="layerNameInput" class="layerNameInput" maxlength="40" spellcheck="false">
                </div>

                <div class="layerSettingsRow">
                    <label class="layerSettingsLabel" for="layerOpacitySlider">Opacidade</label>
                    <div class="opacityControl">
                        <input type="range" id="layerOpacitySlider" class="layerOpacitySlider" min="0" max="100" step="1" value="100">
                        <span id="opacityValue" class="layerOpacityValue">100%</span>
                    </div>
                </div>

                <div class="layerSettingsRow toggleRow">
                    <label class="layerSettingsLabel" for="layerVisibleToggle">Visível</label>
                    <label class="switch">
                        <input type="checkbox" id="layerVisibleToggle" checked>
                        <span class="slider-toggle"></span>
                    </label>
                </div>

                <div class="layerSettingsDivider"></div>

                <button type="button" id="btnDuplicateLayer" class="layerActionBtn">
                    Duplicar camada
                </button>

                <button type="button" id="btnDeleteLayer" class="layerActionBtn danger">
                    Excluir camada
                </button>

            </div>

            <div id="deleteLayerModal" class="confirmOverlay">
                <p class="confirmText">Excluir esta camada? Essa ação é permanente e não pode ser desfeita.</p>

                <label class="confirmCheckboxRow">
                    <input type="checkbox" id="dontWarnAgain">
                    <span>Não mostrar este aviso novamente</span>
                </label>

                <div class="confirmActions">
                    <button type="button" id="btnCancelDelete" class="confirmBtn">Cancelar</button>
                    <button type="button" id="btnConfirmDelete" class="confirmBtn danger">Excluir</button>
                </div>
            </div>

        </div>

        <div id="frames">

            <div id="frameS1">
                <div id="maisframe"></div>
                <img src="imgs/add_circle_.svg" id="maismais" class="maismais" alt="+">
            </div>

        </div>
    </div>
    <!-- Esqueleto do chat -->
    <div id="chatcontainer">

        <p id="fechar" class="fechar"> X </p>

        <div id="mensagens">

        </div>

        <div id="digitar">
            <input type="text" id="espacomsg">
            <img src="imgs/Send 01.svg" id="enviar">
        </div>

    </div>

    <!-- Configs globais (base_url, chibisafe) -->
    <script src="scripts/config.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

    <script src="scripts/scriptSocket.js" defer></script>
    <script src="scripts/scriptDraw.js" defer></script>
    <script src="scripts/scriptChat.js" defer></script>

    <!-- ✅ NOVO: Script de salvar/abrir desenhos -->
    <script src="scripts/scriptDrawings.js" defer></script>

    <script> window.userRole = 'admin'; </script>

</body>

</html>
